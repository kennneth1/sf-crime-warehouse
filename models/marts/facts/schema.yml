version: 2

models:
  - name: fct_incident_offenses
    columns:
      - name: incident_number
        tests:
          - not_null
      - name: incident_code
        tests:
          - not_null
      - name: offense_id
        tests:
          - not_null
      - name: incident_date_id
        tests:
          - not_null
      - name: incident_time_id
        tests:
          - not_null
      - name: report_date_id
        tests:
          - not_null
      - name: report_time_id
        tests:
          - not_null
      - name: geo_id
        tests:
          - not_null

    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns: [incident_number, incident_code]